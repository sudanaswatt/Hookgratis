<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      padding:40px;
    }

    .card{
      background:rgba(255,255,255,.05);
      padding:20px;
      border-radius:16px;
      margin-bottom:20px;
      border:1px solid rgba(255,255,255,.1);
    }

    h1{
      margin-bottom:20px;
    }

    h3{
      margin-bottom:10px;
    }
    .card {
  backdrop-filter: blur(10px);
}

.pending-item {
  background: rgba(255,255,255,0.03);
  padding:16px;
  border-radius:14px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.pending-item:hover {
  border:1px solid rgba(255,255,255,0.2);
}

.pending-label {
  font-size:12px;
  opacity:0.6;
  margin-bottom:4px;
}

.pending-value {
  font-weight:600;
  margin-bottom:8px;
}

.approve-btn {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  transition:0.3s;
}

.approve-btn:hover {
  opacity:0.85;
}

.approve-btn:active {
  transform:scale(0.98);
}
  </style>
</head>

<body>

<h1>Admin Dashboard</h1>

<div class="card">
  <p id="adminStatus">Checking admin...</p>
</div>

<div class="card">
  <h3>Statistik</h3>
  <p>Total User: <span id="totalUser">0</span></p>
  <p>Generate Hari Ini: <span id="todayGenerate">0</span></p>
  <p>Generate Bulan Ini: <span id="monthGenerate">0</span></p>
  <p>Pending Topup: <span id="pendingTopup">0</span></p>
</div>
<div class="card">
  <h3>Pending Topup</h3>
  <div id="pendingList">Loading...</div>
</div>
<script>

const { createClient } = supabase;

const supabaseClient = createClient(
  "https://fvtqwxzkxzauyiaqpauu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2dHF3eHpreHphdXlpYXFwYXV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MzkyMDksImV4cCI6MjA4NzIxNTIwOX0.d1s0att2MuxyFBx5v7lYhGOkQdGe-viUCNRw_HXs4Rk"
);

async function checkAdmin(){

  try {

    const { data: { user } } = await supabaseClient.auth.getUser();

    if(!user){
      document.getElementById("adminStatus").innerText =
        "Belum login. Login dulu di halaman utama.";
      return;
    }

    const ADMIN_EMAIL = "sudanaswatt20@icloud.com";

    if(user.email !== ADMIN_EMAIL){
      document.getElementById("adminStatus").innerText =
        "Bukan admin.";
      return;
    }

    document.getElementById("adminStatus").innerText =
  "Admin berhasil login.";

await loadStats();
await loadPendingTopup();

  } catch(err){
    document.getElementById("adminStatus").innerText =
      "Error membaca session.";
  }
}

async function loadStats(){

  const today = new Date();
  today.setHours(0,0,0,0);

  const firstDayMonth = new Date(today.getFullYear(), today.getMonth(), 1);

  const { count: userCount } = await supabaseClient
    .from("profiles")
    .select("*", { count: "exact", head: true });

  const { count: todayCount } = await supabaseClient
    .from("generate_history")
    .select("*", { count: "exact", head: true })
    .gte("created_at", today.toISOString());

  const { count: monthCount } = await supabaseClient
    .from("generate_history")
    .select("*", { count: "exact", head: true })
    .gte("created_at", firstDayMonth.toISOString());

  const { count: pendingCount } = await supabaseClient
    .from("topup_requests")
    .select("*", { count: "exact", head: true })
    .eq("status", "pending");

  document.getElementById("totalUser").innerText = userCount || 0;
  document.getElementById("todayGenerate").innerText = todayCount || 0;
  document.getElementById("monthGenerate").innerText = monthCount || 0;
  document.getElementById("pendingTopup").innerText = pendingCount || 0;
}
  async function loadPendingTopup(){

  const { data } = await supabaseClient
    .from("topup_requests")
    .select("*")
    .eq("status", "pending")
    .order("created_at", { ascending: false });

  const box = document.getElementById("pendingList");
  box.innerHTML = "";

  if(!data || data.length === 0){
    box.innerHTML = "Tidak ada pending.";
    return;
  }

  data.forEach(item => {
    box.innerHTML += `
  <div class="pending-item">

    <div class="pending-label">User ID</div>
    <div class="pending-value">${item.user_id}</div>

    <div class="pending-label">Amount</div>
    <div class="pending-value">Rp ${item.amount.toLocaleString()}</div>

    <div class="pending-label">Credit</div>
    <div class="pending-value">${item.credit_amount} Credit</div>

    <button class="approve-btn"
      onclick="approveTopup('${item.id}', this)">
      Approve Topup
    </button>

  </div>
`;
  });
}
  window.approveTopup = async function(id, button){

  button.innerText = "Processing...";
  button.disabled = true;

  const { data: sessionData } =
    await supabaseClient.auth.getSession();

  const token = sessionData?.session?.access_token;

  const response = await fetch("/api/approve-topup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({ requestId: id })
  });

  const result = await response.json();

  if(response.ok){
    button.innerText = "Approved ✓";
    button.style.background =
      "linear-gradient(135deg,#6366f1,#4f46e5)";
    await loadStats();
    await loadPendingTopup();
  } else {
    button.innerText = "Approve Failed";
    button.disabled = false;
    alert(result.error);
  }
};

window.addEventListener("load", async () => {
  setTimeout(async () => {
    await checkAdmin();
  }, 500);
});

</script>

</body>
</html>
