<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      padding:40px;
    }

    .card{
      background:rgba(255,255,255,.05);
      padding:20px;
      border-radius:16px;
      margin-bottom:20px;
      border:1px solid rgba(255,255,255,.1);
    }

    h1{
      margin-bottom:20px;
    }

    h3{
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<h1>Admin Dashboard</h1>

<div class="card">
  <p id="adminStatus">Checking admin...</p>
</div>

<div class="card">
  <h3>Statistik</h3>
  <p>Total User: <span id="totalUser">0</span></p>
  <p>Generate Hari Ini: <span id="todayGenerate">0</span></p>
  <p>Generate Bulan Ini: <span id="monthGenerate">0</span></p>
  <p>Pending Topup: <span id="pendingTopup">0</span></p>
</div>
<div class="card">
  <h3>Pending Topup</h3>
  <div id="pendingList">Loading...</div>
</div>
<script>

const { createClient } = supabase;

const supabaseClient = createClient(
  "https://fvtqwxzkxzauyiaqpauu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2dHF3eHpreHphdXlpYXFwYXV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MzkyMDksImV4cCI6MjA4NzIxNTIwOX0.d1s0att2MuxyFBx5v7lYhGOkQdGe-viUCNRw_HXs4Rk"
);

async function checkAdmin(){

  try {

    const { data: { user } } = await supabaseClient.auth.getUser();

    if(!user){
      document.getElementById("adminStatus").innerText =
        "Belum login. Login dulu di halaman utama.";
      return;
    }

    const ADMIN_EMAIL = "sudanaswatt20@icloud.com";

    if(user.email !== ADMIN_EMAIL){
      document.getElementById("adminStatus").innerText =
        "Bukan admin.";
      return;
    }

    document.getElementById("adminStatus").innerText =
  "Admin berhasil login.";

await loadStats();
await loadPendingTopup();

  } catch(err){
    document.getElementById("adminStatus").innerText =
      "Error membaca session.";
  }
}

async function loadStats(){

  const today = new Date();
  today.setHours(0,0,0,0);

  const firstDayMonth = new Date(today.getFullYear(), today.getMonth(), 1);

  const { count: userCount } = await supabaseClient
    .from("profiles")
    .select("*", { count: "exact", head: true });

  const { count: todayCount } = await supabaseClient
    .from("generate_history")
    .select("*", { count: "exact", head: true })
    .gte("created_at", today.toISOString());

  const { count: monthCount } = await supabaseClient
    .from("generate_history")
    .select("*", { count: "exact", head: true })
    .gte("created_at", firstDayMonth.toISOString());

  const { count: pendingCount } = await supabaseClient
    .from("topup_requests")
    .select("*", { count: "exact", head: true })
    .eq("status", "pending");

  document.getElementById("totalUser").innerText = userCount || 0;
  document.getElementById("todayGenerate").innerText = todayCount || 0;
  document.getElementById("monthGenerate").innerText = monthCount || 0;
  document.getElementById("pendingTopup").innerText = pendingCount || 0;
}
  async function loadPendingTopup(){

  const { data } = await supabaseClient
    .from("topup_requests")
    .select("*")
    .eq("status", "pending")
    .order("created_at", { ascending: false });

  const box = document.getElementById("pendingList");
  box.innerHTML = "";

  if(!data || data.length === 0){
    box.innerHTML = "Tidak ada pending.";
    return;
  }

  data.forEach(item => {
    box.innerHTML += `
      <div style="margin-bottom:15px;">
        <p>User ID: ${item.user_id}</p>
        <p>Amount: Rp${item.amount}</p>
        <p>Credit: ${item.credit_amount}</p>
        <button onclick="approveTopup('${item.id}')">
          Approve
        </button>
      </div>
    `;
  });
}
  window.approveTopup = async function(id){

  const { data: sessionData } = await supabaseClient.auth.getSession();
  const token = sessionData?.session?.access_token;

  const response = await fetch("/api/approve-topup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({ requestId: id })
  });

  const result = await response.json();

  if(response.ok){
    alert("Topup disetujui.");
    await loadStats();
    await loadPendingTopup();
  } else {
    alert(result.error);
  }
}

window.addEventListener("load", async () => {
  setTimeout(async () => {
    await checkAdmin();
  }, 500);
});

</script>

</body>
</html>
