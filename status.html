<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Pembayaran</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>

<body>

<div class="container">

  <h2>Status Pembayaran</h2>

  <div class="card" style="margin-top:20px;text-align:center;">

    <p id="statusText">Memuat status...</p>

    <p id="amountText" style="opacity:.7;margin-top:10px;"></p>

    <button id="waBtn" class="generate-btn" style="background:#25D366;margin-top:20px;">
      Chat Admin WhatsApp
    </button>

    <button onclick="window.location.href='index.html'"
      class="generate-btn"
      style="margin-top:15px;">
      Kembali ke Dashboard
    </button>

  </div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://fvtqwxzkxzauyiaqpauu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2dHF3eHpreHphdXlpYXFwYXV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MzkyMDksImV4cCI6MjA4NzIxNTIwOX0.d1s0att2MuxyFBx5v7lYhGOkQdGe-viUCNRw_HXs4Rk"
);

const urlParams = new URLSearchParams(window.location.search);
const requestId = urlParams.get("id");

const statusText = document.getElementById("statusText");
const amountText = document.getElementById("amountText");
const waBtn = document.getElementById("waBtn");

async function loadStatus(){

  if(!requestId){
    statusText.innerText = "ID pembayaran tidak ditemukan.";
    return;
  }

  const { data, error } = await supabase
    .from("topup_requests")
    .select("*")
    .eq("id", requestId)
    .single();

  if(error || !data){
    statusText.innerText = "Data tidak ditemukan.";
    return;
  }

  amountText.innerText = "Jumlah: Rp " + data.amount.toLocaleString();

  if(data.status === "waiting_payment"){
    statusText.innerText = "Menunggu pembayaran.";
  }

  if(data.status === "pending"){
    statusText.innerText = "Pembayaran sedang diverifikasi admin.";
  }

  if(data.status === "approved"){
    statusText.innerText = "Pembayaran berhasil! Credit sudah ditambahkan.";
    waBtn.style.display = "none";
  }

  if(data.status === "rejected"){
    statusText.innerText = "Pembayaran ditolak. Hubungi admin.";
  }
}

// auto refresh setiap 5 detik
setInterval(loadStatus, 5000);

loadStatus();

// tombol WA
waBtn.onclick = ()=>{
  const message = `Halo admin, saya sudah transfer dengan ID: ${requestId}`;
  window.open(
    `https://wa.me/6281523779397?text=${encodeURIComponent(message)}`,
    "_blank"
  );
};

</script>

</body>
</html>
