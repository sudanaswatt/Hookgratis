<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Pembayaran</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>

<body>

<div class="container">

  <h2>Status Pembayaran</h2>

  <div class="card" style="margin-top:20px;text-align:center;">

    <p id="statusText">Memuat status...</p>

    <p id="amountText" style="opacity:.7;margin-top:10px;"></p>

    <button id="waBtn" class="generate-btn" style="background:#25D366;margin-top:20px;">
      Chat Admin WhatsApp
    </button>

    <button onclick="window.location.href='index.html'"
      class="generate-btn"
      style="margin-top:15px;">
      Kembali ke Dashboard
    </button>

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const statusText = document.getElementById("statusText");
  const amountText = document.getElementById("amountText");
  const waBtn = document.getElementById("waBtn");

  const urlParams = new URLSearchParams(window.location.search);
  const requestId = urlParams.get("id");

  statusText.innerText =
    "Terima kasih 🙏 Pembayaran Anda sedang kami proses.";

  amountText.innerText =
    "Silakan klik tombol WhatsApp untuk konfirmasi ke admin.";

  waBtn.addEventListener("click", () => {

    let message =
      "Halo admin, saya sudah melakukan pembayaran.";

    if(requestId){
      message += ` ID Pembayaran: ${requestId}`;
    }

    window.location.href =
      `https://wa.me/6281523779397?text=${encodeURIComponent(message)}`;
  });

});
</script>
</body>
</html>
